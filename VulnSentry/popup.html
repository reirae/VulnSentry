<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body { width: 380px; padding: 10px; font-family: sans-serif; }
      h2 { color: #d32f2f; margin-bottom: 4px; }
      .status { margin-top: 10px; padding: 10px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; }

      #scan-log {
        margin-top: 10px;
        padding: 8px;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: monospace;
        font-size: 10px;
        border-radius: 4px;
        max-height: 160px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
        display: none;
      }

      #toggle-log {
        font-size: 11px;
        color: #555;
        cursor: pointer;
        background: none;
        border: none;
        padding: 4px 0;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h2>VulnSentry</h2>
    <p style="margin:2px 0;">Target: <strong><span id="site-url">Loading...</span></strong></p>
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
      <span id="cache-info" style="font-size:11px; color:#666; display:none;"></span>
      <button id="rescan-btn" style="font-size:11px; padding:4px 10px; cursor:pointer; background:#f5f5f5; border:1px solid #ddd; border-radius:4px;">🔄 Rescan</button>
    </div>

    <div class="status">
      <strong>Tech Stack Detected:</strong>
      <ul id="tech-list" style="padding-left:16px; margin-top:6px;">
        <li>Scanning...</li>
      </ul>
    </div>

    <button id="toggle-log">+ Show scan log</button>
    <pre id="scan-log"></pre>

    <script src="popup.js"></script>
  </body>
</html>
